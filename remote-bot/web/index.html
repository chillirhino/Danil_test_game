<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="/app.webmanifest">
<title>🦫 Console</title>
<style>
  :root { --bg:#0b0f14; --panel:#111823; --line:#1c2735; --txt:#d6e2ef; --dim:#7b8ba0;
          --you:#6cc7ff; --bash:#8ef58a; --edit:#ffd479; --res:#8aa0b8; --done:#7cf29b; --err:#ff7b7b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family:"SF Mono",Menlo,Consolas,"Roboto Mono",monospace; font-size:14px; }
  body { display:flex; flex-direction:column; height:100dvh; }
  header { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--panel);
    border-bottom:1px solid var(--line); font-weight:600; }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--err); flex:none; }
  header .dot.on { background:var(--done); }
  header .sp { flex:1; }
  header button { background:transparent; border:1px solid var(--line); color:var(--dim);
    border-radius:8px; padding:5px 9px; font-size:12px; }
  #log { flex:1; overflow-y:auto; padding:10px 10px 4px; -webkit-overflow-scrolling:touch; }
  .msg { white-space:pre-wrap; word-break:break-word; margin:0 0 9px; line-height:1.4; }
  .you  { color:var(--you); font-weight:700; }
  .you::before { content:"› "; }
  .text { color:var(--txt); }
  .bash { color:var(--bash); background:#0e1620; border-left:3px solid #2b6; padding:7px 9px; border-radius:6px; }
  .edit { color:var(--edit); background:#181207; border-left:3px solid #a80; padding:7px 9px; border-radius:6px; font-size:13px; }
  .tool { color:var(--dim); }
  .result { color:var(--res); font-size:12.5px; opacity:.9; }
  .done { color:var(--done); font-weight:700; }
  .done::before { content:"✓ "; }
  .error { color:var(--err); font-weight:600; }
  .info { color:var(--dim); font-style:italic; }
  #bar { display:flex; gap:8px; padding:8px; background:var(--panel); border-top:1px solid var(--line); }
  #inp { flex:1; resize:none; height:44px; max-height:140px; background:#0e1620; color:var(--txt);
    border:1px solid var(--line); border-radius:10px; padding:11px; font:inherit; }
  #snd { flex:none; width:52px; border:0; border-radius:10px; background:#2b6cff; color:#fff; font-size:20px; }
  #snd:disabled { opacity:.4; }
  #login { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:24px; text-align:center; }
  #login h1 { margin:0; font-size:22px; }
  #login input { width:100%; max-width:280px; padding:13px; border-radius:10px; border:1px solid var(--line);
    background:#0e1620; color:var(--txt); font:inherit; }
  #login button { padding:12px 22px; border:0; border-radius:10px; background:#2b6cff; color:#fff; font-size:16px; }
  #login .hint { color:var(--dim); font-size:12px; }
  .hidden { display:none !important; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span><span>🦫 Console</span><span class="sp"></span>
    <button id="newBtn">/new</button><button id="keyBtn">🔑</button>
  </header>
  <div id="log"></div>
  <form id="bar">
    <textarea id="inp" placeholder="Задача… (Enter — отправить, Shift+Enter — перенос)" autocomplete="off"></textarea>
    <button id="snd" type="submit">➤</button>
  </form>

  <div id="login">
    <h1>🦫 Console</h1>
    <input id="pw" type="password" placeholder="Пароль" autocomplete="current-password">
    <button id="pwBtn">Войти</button>
    <div class="hint">Пароль задаётся в config.json → webPassword</div>
  </div>

<script>
(function(){
  var pass = localStorage.getItem('pass') || '';
  var es = null, connected = false;
  var log = document.getElementById('log'), dot = document.getElementById('dot');
  var inp = document.getElementById('inp'), snd = document.getElementById('snd');
  var login = document.getElementById('login'), pw = document.getElementById('pw');

  function add(ev){
    var d = document.createElement('div');
    d.className = 'msg ' + (ev.kind || 'text');
    d.textContent = ev.text || '';
    var near = log.scrollHeight - log.scrollTop - log.clientHeight < 120;
    log.appendChild(d);
    if (near) log.scrollTop = log.scrollHeight;
  }
  function setDot(on){ connected = on; dot.classList.toggle('on', on); }

  function connect(){
    if (es) es.close();
    es = new EventSource('/stream?pass=' + encodeURIComponent(pass));
    es.onopen = function(){ setDot(true); };
    es.onmessage = function(e){ try { add(JSON.parse(e.data)); } catch(_){} };
    es.onerror = function(){
      setDot(false);
      // if it never opened, likely a bad password
      if (!connected && es.readyState === 2) { es.close(); showLogin('Неверный пароль?'); }
    };
  }
  function showLogin(msg){ login.classList.remove('hidden'); if (msg) pw.placeholder = msg; pw.focus(); }
  function hideLogin(){ login.classList.add('hidden'); }

  async function send(text){
    text = (text||'').trim(); if (!text) return;
    try {
      var r = await fetch('/send', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text: text, pass: pass }) });
      if (r.status === 401) { showLogin('Неверный пароль?'); }
    } catch(_) { add({ kind:'error', text:'Нет связи с ПК.' }); }
  }

  // form
  document.getElementById('bar').addEventListener('submit', function(e){
    e.preventDefault(); var t = inp.value; inp.value=''; inp.style.height='44px'; send(t);
  });
  inp.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('bar').requestSubmit(); }
  });
  inp.addEventListener('input', function(){ inp.style.height='44px'; inp.style.height = Math.min(inp.scrollHeight,140)+'px'; });
  document.getElementById('newBtn').addEventListener('click', function(){ send('/new'); });
  document.getElementById('keyBtn').addEventListener('click', function(){ showLogin('Пароль'); });

  // login
  function doLogin(){ pass = pw.value.trim(); if (!pass) return; localStorage.setItem('pass', pass); hideLogin(); connect(); }
  document.getElementById('pwBtn').addEventListener('click', doLogin);
  pw.addEventListener('keydown', function(e){ if (e.key==='Enter') doLogin(); });

  if (pass) { hideLogin(); connect(); } else { showLogin(); }
})();
</script>
</body>
</html>
